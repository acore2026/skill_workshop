<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#0099ff"/>
      <stop offset="100%" style="stop-color:#6b5ce7"/>
    </linearGradient>
  </defs>
  
  <!-- Hexagon background -->
  <polygon points="50,5 93,30 93,70 50,95 7,70 7,30" fill="url(#gradient)"/>
  
  <!-- Inner white hexagon for text background -->
  <polygon points="50,15 83,35 83,65 50,85 17,65 17,35" fill="white"/>
  
  <!-- 6G Text -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="url(#gradient)">6G</text>
</svg>